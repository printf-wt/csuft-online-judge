server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: ${FORWARD_HEADERS_STRATEGY:NATIVE}

spring:
  application:
    name: csuft-oj
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/csuft_oj?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: true
  servlet:
    multipart:
      max-file-size: ${MAX_TESTCASE_ARCHIVE_SIZE:64MB}
      max-request-size: ${MAX_TESTCASE_ARCHIVE_SIZE:64MB}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.csuft.oj.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.nologging.NoLoggingImpl}
  global-config:
    db-config:
      id-type: auto

csuft-oj:
  submission:
    max-code-length: ${SUBMISSION_MAX_CODE_LENGTH:131072}
  upload:
    testcase-path: ${TESTCASE_PATH:uploads/testcases/}
    max-archive-bytes: ${TESTCASE_MAX_ARCHIVE_BYTES:67108864}
    max-entry-count: ${TESTCASE_MAX_ENTRY_COUNT:400}
    max-entry-bytes: ${TESTCASE_MAX_ENTRY_BYTES:16777216}
    max-total-uncompressed-bytes: ${TESTCASE_MAX_TOTAL_BYTES:268435456}
    max-compression-ratio: ${TESTCASE_MAX_COMPRESSION_RATIO:100}
  judge:
    temp-path: ${JUDGE_TEMP_PATH:uploads/judge-temp/}
    max-output-bytes: ${JUDGE_MAX_OUTPUT_BYTES:8388608}
    queue-capacity: ${JUDGE_QUEUE_CAPACITY:1000}
    worker-count: ${JUDGE_WORKER_COUNT:2}
    recovery-enabled: ${JUDGE_RECOVERY_ENABLED:true}
    execution-mode: ${JUDGE_EXECUTION_MODE:HOST}
    sandbox-command: ${JUDGE_SANDBOX_COMMAND:}
    compile-memory-limit-kb: ${JUDGE_COMPILE_MEMORY_LIMIT_KB:1048576}
  security:
    jwt:
      secret: ${JWT_SECRET:local-development-jwt-secret-change-before-production}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:900}
      refresh-expiration-seconds: ${JWT_REFRESH_EXPIRATION_SECONDS:604800}
      refresh-cookie-secure: ${JWT_REFRESH_COOKIE_SECURE:false}
  rate-limit:
    login-attempts: ${RATE_LIMIT_LOGIN_ATTEMPTS:10}
    login-window-seconds: ${RATE_LIMIT_LOGIN_WINDOW_SECONDS:300}
    register-attempts: ${RATE_LIMIT_REGISTER_ATTEMPTS:5}
    register-window-seconds: ${RATE_LIMIT_REGISTER_WINDOW_SECONDS:3600}
    submissions: ${RATE_LIMIT_SUBMISSIONS:30}
    submission-window-seconds: ${RATE_LIMIT_SUBMISSION_WINDOW_SECONDS:60}

management:
  server:
    port: ${MANAGEMENT_PORT:8081}
    address: ${MANAGEMENT_ADDRESS:127.0.0.1}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      group:
        readiness:
          include: readinessState,db,judge
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: ${spring.application.name}
    version: ${APP_VERSION:0.0.1-SNAPSHOT}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [requestId=%X{requestId:-}] %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/csuft-oj.log}
  logback:
    rollingpolicy:
      max-file-size: ${LOG_MAX_FILE_SIZE:50MB}
      max-history: ${LOG_MAX_HISTORY:14}
      total-size-cap: ${LOG_TOTAL_SIZE_CAP:1GB}
